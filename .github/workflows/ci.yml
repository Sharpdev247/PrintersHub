name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: "3.4.9"

# ── Security scans ───────────────────────────────────────────────────────────

jobs:
  scan_ruby:
    name: "Security: Brakeman"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Run Brakeman
        run: bin/brakeman --no-pager --confidence-level=2

  scan_gems:
    name: "Security: Bundler audit"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Audit gems for known CVEs
        run: bin/bundler-audit --update

  scan_js:
    name: "Security: importmap audit"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Audit JavaScript dependencies
        run: bin/importmap audit

# ── Lint ──────────────────────────────────────────────────────────────────────

  lint:
    name: "Lint: RuboCop"
    runs-on: ubuntu-latest

    env:
      RUBOCOP_CACHE_ROOT: tmp/rubocop

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Cache RuboCop results
        uses: actions/cache@v4
        env:
          DEPS_HASH: ${{ hashFiles('.ruby-version', '**/.rubocop.yml', 'Gemfile.lock') }}
        with:
          path: ${{ env.RUBOCOP_CACHE_ROOT }}
          key: rubocop-${{ runner.os }}-${{ env.DEPS_HASH }}-${{ github.ref_name == github.event.repository.default_branch && github.run_id || 'default' }}
          restore-keys: rubocop-${{ runner.os }}-${{ env.DEPS_HASH }}-

      - name: Run RuboCop
        run: bin/rubocop -f github

# ── Tests ─────────────────────────────────────────────────────────────────────

  test:
    name: "Tests"
    runs-on: ubuntu-latest
    needs: [scan_ruby, scan_gems, lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: printershub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up database
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/printershub_test
        run: bin/rails db:test:prepare

      - name: Run model & service tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/printershub_test
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE || 'a-test-secret-key-base-placeholder-1234567890' }}
          # ANTHROPIC_API_KEY intentionally absent — AI tests degrade gracefully
        run: bin/rails test test/models test/services

      - name: Run controller & integration tests
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/printershub_test
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE || 'a-test-secret-key-base-placeholder-1234567890' }}
        run: bin/rails test test/controllers test/integration test/helpers test/mailers

      - name: Collect coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tmp/test-results/
          if-no-files-found: ignore

# ── Deploy ────────────────────────────────────────────────────────────────────

  deploy:
    name: "Deploy (Kamal)"
    runs-on: ubuntu-latest
    needs: [test]

    # Only deploy from main branch when DEPLOY_ENABLED repo variable is set to 'true'
    # Set it in GitHub → Settings → Variables → Actions → New repository variable
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.DEPLOY_ENABLED == 'true'

    environment:
      name: production
      url: https://printershub.com

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate with Docker registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Add deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy with Kamal
        env:
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          DOCKER_REGISTRY_USER: ${{ secrets.DOCKER_REGISTRY_USER }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
        run: bin/kamal deploy
