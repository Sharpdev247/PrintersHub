default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: printers_hub_development

test:
  <<: *default
  # DATABASE_URL takes full precedence when set (used in CI).
  # Falls back to the default host/port config for local dev.
  url: <%= ENV["DATABASE_URL"] %>
  database: printers_hub_test

production:
  primary: &primary_production
    <<: *default
    database: printers_hub_production
    username: <%= ENV.fetch("DB_USERNAME", "printers_hub") %>
    password: <%= ENV["PRINTERS_HUB_DATABASE_PASSWORD"] %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
  cache:
    <<: *primary_production
    database: printers_hub_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: printers_hub_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: printers_hub_production_cable
    migrations_paths: db/cable_migrate
