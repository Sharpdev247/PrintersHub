# PrintersHub — Kamal 2.x deploy configuration
# Docs: https://kamal-deploy.org
#
# Before first deploy:
#   1. Set all secrets in .kamal/secrets (pull from ENV or a password manager)
#   2. Update server IPs below
#   3. Update the domain/host under proxy.host
#   4. Run: bin/kamal setup   (first time only — provisions servers, installs Docker)
#   5. Run: bin/kamal deploy  (subsequent deploys)

service: printershub
image:   your-dockerhub-user/printershub   # ← replace with your registry path

# ── Servers ──────────────────────────────────────────────────────────────────
servers:
  web:
    hosts:
      - YOUR_SERVER_IP   # ← replace with actual IP(s)
    labels:
      traefik.http.routers.printershub.rule: Host(`printershub.com`)
    options:
      memory: 1g          # cap container RAM; adjust to your server size

  # Dedicated job worker (uncomment when scaling beyond a single server)
  # job:
  #   hosts:
  #     - YOUR_JOB_SERVER_IP
  #   cmd: bin/jobs

# ── Reverse proxy (Kamal Proxy / Traefik) ────────────────────────────────────
proxy:
  ssl: true
  host: printershub.com        # ← your domain; Let's Encrypt cert auto-provisioned
  # If behind Cloudflare (Full SSL mode) or a load balancer that terminates SSL:
  # ssl: false
  app_port: 80
  healthcheck:
    path: /up
    interval: 5
    threshold: 5   # 5 consecutive failures → unhealthy

# ── Docker registry ───────────────────────────────────────────────────────────
registry:
  server: registry.hub.docker.com   # Docker Hub; change for ghcr.io / DO / etc.
  username: your-dockerhub-user     # ← replace
  password:
    - KAMAL_REGISTRY_PASSWORD       # pulled from .kamal/secrets

# ── Environment variables ─────────────────────────────────────────────────────
env:
  secret:
    - RAILS_MASTER_KEY
    - ANTHROPIC_API_KEY      # optional; AI features silently disabled if absent
    - DATABASE_URL           # full postgres:// connection string
    - DEVISE_MAILER_SENDER   # e.g. no-reply@printershub.com
    - SMTP_ADDRESS
    - SMTP_PORT
    - SMTP_USERNAME
    - SMTP_PASSWORD

  clear:
    RAILS_LOG_LEVEL:    info
    SOLID_QUEUE_IN_PUMA: true
    WEB_CONCURRENCY:    2         # Puma workers; tune to (CPU cores - 1)
    RAILS_MAX_THREADS:  5

# ── Image builder ─────────────────────────────────────────────────────────────
builder:
  arch: amd64
  # For Apple Silicon (M-series) local builds targeting amd64 servers:
  # remote: ssh://docker@build-server-ip
  args:
    RUBY_VERSION: 3.4.9
  cache:
    type: registry
    options: mode=max
    image: your-dockerhub-user/printershub-build-cache   # ← replace

# ── SSH ───────────────────────────────────────────────────────────────────────
ssh:
  user: deploy   # dedicated non-root deploy user on each server

# ── Persistent volumes ────────────────────────────────────────────────────────
volumes:
  - printershub_storage:/rails/storage   # Active Storage uploads

# ── Asset bridging ────────────────────────────────────────────────────────────
asset_path: /rails/public/assets

# ── Deploy hooks ──────────────────────────────────────────────────────────────
# Kamal runs scripts in .kamal/hooks/ at each lifecycle event.
# pre-deploy, post-deploy, pre-connect, docker-setup, etc.

# ── Useful aliases ────────────────────────────────────────────────────────────
aliases:
  console:  app exec --interactive --reuse "bin/rails console"
  shell:    app exec --interactive --reuse "bash"
  logs:     app logs -f
  dbc:      app exec --interactive --reuse "bin/rails dbconsole --include-password"
  migrate:  app exec "bin/rails db:migrate"
  rollback: app exec "bin/rails db:rollback"

# ── Accessories (managed containers on the same server) ───────────────────────
# Use this for single-server setups. For production scale, use a managed
# database (RDS, DigitalOcean Managed PG, etc.) and set DATABASE_URL instead.
#
# accessories:
#   db:
#     image: postgres:16-alpine
#     host: YOUR_SERVER_IP
#     port: "127.0.0.1:5432:5432"   # localhost-only — not exposed to the internet
#     env:
#       secret:
#         - POSTGRES_PASSWORD
#       clear:
#         POSTGRES_USER: printershub
#         POSTGRES_DB:   printershub_production
#     directories:
#       - printershub_postgres_data:/var/lib/postgresql/data
